# Markdownlint CLI 2 Configuration
# https://github.com/DavidAnson/markdownlint-cli2

config:
  # MD013: Line length - Allow longer lines in changelogs
  MD013:
    line_length: 120
    tables: false
    code_blocks: false
    headings: false

  # MD024: Multiple headings with same content
  # Allow in CHANGELOG.md where duplicate headings under different versions are valid
  MD024:
    allow_different_nesting: true
    siblings_only: true

  # MD032: Blanks around lists - Be more lenient
  MD032: true

  # MD040: Fenced code blocks should have language
  MD040: true

  # MD041: First line should be heading
  MD041:
    level: 1
    front_matter_title: ""

# Ignore patterns
ignore:
  - "**/node_modules/**"
  - "**/target/**"
  - "**/.vitepress/dist/**"

# Markdownlint CLI 2 Configuration
# https://github.com/DavidAnson/markdownlint-cli2

# Enable necessary rules for quality documentation
config:
  MD013:
    line_length: 120
    code_blocks: false
  MD024:
    siblings_only: true
  MD033: false  # Allow HTML (VitePress needs it)
  MD041: true   # First line must be a heading

# Ignore generated and vendor directories
ignores:
  - "node_modules"
  - ".vitepress/dist"
  - ".vitepress/cache"
  - "target"

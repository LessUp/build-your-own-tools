# Markdownlint CLI 2 Configuration
# https://github.com/DavidAnson/markdownlint-cli2

# Rules configuration
rules:
  # MD013: Line length - Allow longer lines
  MD013:
    line_length: 159
    tables: false
    code_blocks: false

  # MD024: Multiple headings with same content
  # Allow in CHANGELOG.md where duplicate headings under different versions are valid
  MD024:
    allow_different_nesting: true
    siblings_only: true

  # MD032: Blanks around lists
  MD032: true

  # MD040: Fenced code blocks should have language
  MD040: true

  # MD041: First line should be heading - disable for templates
  MD041: false

# Ignore patterns
ignores:
  - "**/node_modules/**"
  - "**/target/**"
  - "**/.vitepress/dist/**"

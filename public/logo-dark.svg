<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad-dark)"/>
  <g fill="#ffffff">
    <!-- Terminal window - Dark mode version with lighter background for contrast -->
    <rect x="15" y="15" width="70" height="70" rx="8" fill="#111827" opacity="0.95"/>
    <!-- Window title bar -->
    <rect x="15" y="15" width="70" height="12" rx="8" fill="#1f2937"/>
    <!-- Window controls -->
    <circle cx="22" cy="21" r="2" fill="#f87171"/>
    <circle cx="28" cy="21" r="2" fill="#fbbf24"/>
    <circle cx="34" cy="21" r="2" fill="#4ade80"/>
    <!-- Code brackets -->
    <path d="M35 40 L25 50 L35 60" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M65 40 L75 50 L65 60" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Slash -->
    <path d="M45 65 L55 35" stroke="#f87171" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>

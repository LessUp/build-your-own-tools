<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  <g fill="#ffffff">
    <!-- Terminal window -->
    <rect x="15" y="15" width="70" height="70" rx="8" fill="#1f2937" opacity="0.9"/>
    <!-- Window title bar -->
    <rect x="15" y="15" width="70" height="12" rx="8" fill="#374151"/>
    <!-- Window controls -->
    <circle cx="22" cy="21" r="2" fill="#ef4444"/>
    <circle cx="28" cy="21" r="2" fill="#f59e0b"/>
    <circle cx="34" cy="21" r="2" fill="#22c55e"/>
    <!-- Code brackets -->
    <path d="M35 40 L25 50 L35 60" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M65 40 L75 50 L65 60" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Slash -->
    <path d="M45 65 L55 35" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>

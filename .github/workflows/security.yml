name: Security Audit

on:
  push:
    branches: [master, main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/go.mod"
      - "**/go.sum"
      - "deny.toml"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/go.mod"
      - "**/go.sum"
      - "deny.toml"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Rust Security Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Rust Dependency Check
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Go Security Scan (gzip)
        working-directory: gzip/go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Go Security Scan (htop)
        working-directory: htop/win/go
        run: govulncheck ./...

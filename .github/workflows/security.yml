name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny check
        run: cargo deny check

  go-security:
    name: Go Security Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - path: "gzip/go"
            name: "gzip-go"
          - path: "htop/win/go"
            name: "htop-win-go"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: ${{ matrix.module.path }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ matrix.module.path }}
        run: govulncheck ./...

      - name: Run go mod verify
        working-directory: ${{ matrix.module.path }}
        run: go mod verify

  security-summary:
    name: Security Summary
    needs: [rust-audit, go-security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check security scan results
        run: |
          if [[ "${{ needs.rust-audit.result }}" == "failure" ]] || \
             [[ "${{ needs.go-security.result }}" == "failure" ]]; then
            echo "Some security checks failed"
            exit 1
          fi
          echo "All security checks passed"

name: 🚀 Ultra Deploy

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "**.md"
      - ".vitepress/**"
      - ".github/workflows/pages*.yml"
      - "package.json"
  pull_request:
    paths:
      - "docs/**"
      - ".vitepress/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '22'
  NPM_CACHE_KEY: npm-${{ hashFiles('package-lock.json', 'package.json') }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  actions: read

jobs:
  # ============================================================================
  # 预检工作
  # ============================================================================
  preflight:
    name: 🔍 Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for skip flags
        id: check
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[skip deploy]"* ]] || \
             [[ "${{ github.event.head_commit.message }}" == *"[skip ci]"* ]]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "🛑 Deployment skipped via commit message"
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Deployment will proceed"
          fi

  # ============================================================================
  # 代码质量检查
  # ============================================================================
  lint:
    name: 📝 Lint & Format
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ env.NPM_CACHE_KEY }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run Prettier
        run: npx prettier --check '**/*.{js,ts,json,md}' || true

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          ignore: '**/node_modules/**,**/target/**,**/.vitepress/**,**/CHANGELOG.md'

  # ============================================================================
  # 链接检查
  # ============================================================================
  link-check:
    name: 🔗 Link Check
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --timeout 60
            --retry 3
            --max-concurrency 5
            --exclude-path node_modules
            --exclude-path target
            --exclude-path .vitepress/dist
            --exclude "https://github.com/LessUp/build-your-own-tools/(edit|releases|compare)/.*"
            --exclude "localhost"
            --exclude "127.0.0.1"
            --accept 200,201,204,301,302,307,308,403,429
            .
        continue-on-error: true

      - name: Upload lychee report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lychee-report
          path: lychee/out.md

  # ============================================================================
  # 图片优化
  # ============================================================================
  optimize-images:
    name: 🖼️ Optimize Images
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Optimize images
        uses: calibreapp/image-actions@main
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          compressOnly: true
          jpegQuality: '85'
          jpegProgressive: true
          pngQuality: '90'
          webpQuality: '90'
          ignorePaths: 'node_modules/**,target/**'

  # ============================================================================
  # 构建阶段
  # ============================================================================
  build:
    name: 📦 Build
    needs: [preflight, lint, link-check]
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-build.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate build key
        id: build-key
        run: |
          echo "key=build-${{ hashFiles('package.json', '.vitepress/**', 'docs/**', '**/README.md') }}" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: .vitepress/dist
          key: ${{ steps.build-key.outputs.key }}

      - name: Install dependencies
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Build documentation
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          npm run docs:build
          echo "Build completed at $(date)"

      - name: Generate Service Worker
        run: |
          cat > .vitepress/dist/sw.js << 'SWEOF'
          const CACHE_NAME = 'byot-docs-v1';
          const urlsToCache = [
            '/build-your-own-tools/',
            '/build-your-own-tools/index.html',
            '/build-your-own-tools/404.html'
          ];

          self.addEventListener('install', (event) => {
            event.waitUntil(
              caches.open(CACHE_NAME)
                .then((cache) => cache.addAll(urlsToCache))
            );
            self.skipWaiting();
          });

          self.addEventListener('fetch', (event) => {
            event.respondWith(
              caches.match(event.request)
                .then((response) => {
                  if (response) return response;
                  return fetch(event.request);
                })
            );
          });
          SWEOF

          # 注册 Service Worker
          cat >> .vitepress/dist/index.html << 'HTMLEOF'
          <script>
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/build-your-own-tools/sw.js');
            }
          </script>
          HTMLEOF

      - name: Create SEO files
        run: |
          # Create humans.txt
          cat > .vitepress/dist/humans.txt << 'EOF'
          /* TEAM */
          Maintainer: LessUp
          Contact: https://github.com/LessUp
          From: China

          /* SITE */
          Last update: $(date +%Y-%m-%d)
          Standards: HTML5, CSS3, ES2022
          Components: VitePress, Vue 3
          Software: Rust, Go
          EOF

          # Create security.txt
          mkdir -p .vitepress/dist/.well-known
          cat > .vitepress/dist/.well-known/security.txt << 'EOF'
          Contact: https://github.com/LessUp/build-your-own-tools/issues
          Expires: 2027-01-01T00:00:00.000Z
          Preferred-Languages: en, zh-CN
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: .vitepress/dist/
          retention-days: 1
          if-no-files-found: error

  # ============================================================================
  # Lighthouse 性能测试
  # ============================================================================
  lighthouse:
    name: 🚨 Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: |
          lhci autorun --config=./lighthouserc.js
        continue-on-error: true

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: '.lighthouseci/'

  # ============================================================================
  # 部署预览
  # ============================================================================
  deploy-preview:
    name: 🌐 Deploy Preview
    needs: [build, lighthouse]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview-${{ github.event.number }}
      url: ${{ steps.preview.outputs.url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist

      - name: Deploy to surge.sh
        id: preview
        uses: dswistowski/surge-sh-action@v1
        with:
          domain: 'byot-pr-${{ github.event.number }}.surge.sh'
          project: 'dist'
          login: ${{ secrets.SURGE_LOGIN }}
          token: ${{ secrets.SURGE_TOKEN }}
        continue-on-error: true

      - name: Preview URL fallback
        if: failure()
        id: preview-fallback
        run: |
          echo "url=https://github.com/LessUp/build-your-own-tools/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}' || '${{ steps.preview-fallback.outputs.url }}';
            const body = `🚀 **Preview Deployment**
            
            🔗 Preview URL: ${url}
            
            *This preview is automatically updated on every push.*
            
            <details>
            <summary>Build Info</summary>
            
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.head_ref }}
            - Time: ${{ github.event.head_commit.timestamp }}
            </details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ============================================================================
  # 生产部署
  # ============================================================================
  deploy-production:
    name: 🚀 Deploy Production
    needs: [build, lighthouse]
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Successfully deployed to: https://lessup.github.io/build-your-own-tools/"
          echo "⏰ Deployed at: $(date -u)"

      - name: Purge Cache (Cloudflare)
        if: success()
        continue-on-error: true
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || true

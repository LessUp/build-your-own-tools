name: Deploy Docs

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "dos2unix/**/*.md"
      - "gzip/**/*.md"
      - "htop/**/*.md"
      - "*.md"
      - ".vitepress/**"
      - ".github/workflows/pages.yml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .vitepress
            docs
            dos2unix
            gzip
            htop
            index.md
            package.json
            package-lock.json
            CHANGELOG.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            README.zh-CN.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

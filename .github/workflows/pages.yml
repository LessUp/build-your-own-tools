name: Docs

on:
  push:
    branches: [master, main]
    paths:
      - "index.md"
      - "README.md"
      - "README.zh-CN.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "docs/**"
      - "en/**"
      - "public/**"
      - "dos2unix/**/*.md"
      - "gzip/**/*.md"
      - "htop/**/*.md"
      - ".vitepress/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "index.md"
      - "README.md"
      - "README.zh-CN.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "docs/**"
      - "en/**"
      - "public/**"
      - "dos2unix/**/*.md"
      - "gzip/**/*.md"
      - "htop/**/*.md"
      - ".vitepress/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Validate and build docs
        run: npm run docs:check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

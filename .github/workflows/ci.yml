name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "en/**"
      - "public/**"
      - ".vitepress/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "en/**"
      - "public/**"
      - ".vitepress/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --all --all-features

      - name: Cargo build (release)
        run: cargo build --all --release

  go-gzip:
    name: Go gzip (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: gzip/go
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: gzip/go/go.mod

      - name: gofmt check
        run: |
          changed=$(gofmt -l .)
          if [ -n "$changed" ]; then
            echo "Go files not formatted:" >&2
            echo "$changed" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -o bin/gzip-go ./cmd/gzip-go

  go-htop-windows:
    name: Go htop (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: htop/win/go
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: htop/win/go/go.mod

      - name: gofmt check
        shell: pwsh
        run: |
          $changed = gofmt -l .
          if ($changed) {
            Write-Host "Go files not formatted:"
            $changed
            exit 1
          }

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  ci-success:
    name: CI Success
    needs: [rust, go-gzip, go-htop-windows]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.rust.result }}" != "success" ]] || \
             [[ "${{ needs.go-gzip.result }}" != "success" ]] || \
             [[ "${{ needs.go-htop-windows.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed!"
